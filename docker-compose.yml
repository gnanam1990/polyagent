services:
  polyagent:
    build: .
    image: polyagent:latest
    container_name: polyagent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      POLYAGENT_LOG_LEVEL: INFO
      POLYAGENT_DB_PATH: /data/polyagent.db
    volumes:
      - polyagent-data:/data
      # To enable auth-gated endpoints, uncomment the two mounts below
      # and set KPASS_BIN + KPASS_CONFIG_DIR (defaults work if you have
      # the standard kpass install). /health works without these.
      #
      # - ${KPASS_BIN:-${HOME}/.local/bin/kpass}:/usr/local/bin/kpass:ro
      # - ${KPASS_CONFIG_DIR:-${HOME}/.kite-passport}:/home/polyagent/.kite-passport:ro

volumes:
  polyagent-data:
